# sanitization rules for pre-processing the actual and expected output text
# prior to checking that they match.
# https://nbval.readthedocs.io/en/latest/#REGEX-Output-sanitizing

# warning messages (like our experimental warnings) include a filepath
# that changes based on the environment the notebook is run in.
# The filepath itself isn't interesting and doesn't need to be tested,
# so just replace the filepaths with some dummy text.
# Note: apparently multiple warnings can be in a single string
# (separated by \n), so don't use ^ to match the start of string.
[regex1]
regex: .*: UserWarning:
replace: NBVAL-FILEPATH: UserWarning:

# sanitize the specific traceback file/line entry shown in warning tracebacks
# since stacklevel changes will alter which line is reported
[regex2]
regex: ^\s*File ".*", line \d+.*$
replace:   CODE-LINE

# filterpy emits a SyntaxWarning for invalid escape sequences in Python 3.13+.
# This warning only appears on first compilation (no cached .pyc), so it shows
# up in CI but not locally.  Strip it from the comparison.
[regex3]
regex: .*SyntaxWarning: invalid escape sequence.*\n?
replace:

[regex4]
regex: \s*P = \\Sum \{A\[i\] B\[i\]\.T\} for i in 0\.\.N\n?
replace:

[regex5]
regex: \d{1,2}/\d{1,2}/\d{2,4}
replace: DATE-STAMP

[regex6]
regex: \d{2}:\d{2}:\d{2}
replace: TIME-STAMP
